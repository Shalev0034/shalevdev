<script type="text/javascript">

window.addEventListener("scroll", () => {
if (window.scrollY < 100) {  
  document.getElementById('header').className = "header"
} else {
  document.getElementById('header').className = "header-scrolled"
}
});

</script>

<script>

window.addEventListener('beforeunload', function (e) {
    e.preventDefault();
    $.post( "/updateTable", {
    javascript_data: document.documentElement.innerHTML,
    date: document.getElementById('calender-date').innerHTML
});
});

let typingTimer;                //timer identifier
let doneTypingInterval = 300;  //time in ms 
//on keyup, start the countdown
document.addEventListener('keyup', () => {
    clearTimeout(typingTimer);
   
    typingTimer = setTimeout(doneTyping, doneTypingInterval);
    
});

//user is "finished typing," do something
function doneTyping () {
    $.post( "/updateTable", {
    javascript_data: document.documentElement.innerHTML,
    date: document.getElementById('calender-date').innerHTML

});
}

function bold(){
    document.execCommand("bold"); 
    $.post( "/updateTable", {
    javascript_data: document.documentElement.innerHTML,
    date: document.getElementById('calender-date').innerHTML

});  
}

function underline(){
    document.execCommand("underline");
    $.post( "/updateTable", {
    javascript_data: document.documentElement.innerHTML,
    date: document.getElementById('calender-date').innerHTML

});
}

function italic(){
    document.execCommand("italic")
    $.post( "/updateTable", {
    javascript_data: document.documentElement.innerHTML,
    date: document.getElementById('calender-date').innerHTML

});
}

function changeFontColor(){
document.execCommand("foreColor",false,document.getElementById('colorpicker').value);
    $.post( "/updateTable", {
    javascript_data: document.documentElement.innerHTML,
    date: document.getElementById('calender-date').innerHTML

});
}

function changeBackColor(){
    document.execCommand("backColor",false,document.getElementById('colorpicker').value);
    $.post( "/updateTable", {
    javascript_data: document.documentElement.innerHTML,
    date: document.getElementById('calender-date').innerHTML

});
}


 
function deleteMajor(id){
 $.post( "/deleteMajor", {
    javascript_data: id
});
window.location.reload()
}


function submit(){
    document.getElementById('selectKeyWord').submit();
}

function removeKeyWord(keywordButton){
     $.post( "/removeKeyWord", {
    keyword: keywordButton
});
window.location.reload()
}

</script>



</head>

<body class="home-body">


<!-- ======= Header ======= -->
<header id="header" class="header">

<h1 id="header-title">School Scraper</h1>
<a id="header-a" href="/logout">Logout</a>

</header>




<div id="div-content">

<div style="height:50px;"></div>

<div id="div-cal-edits">

<!--==Table Edits==-->

<!--Table Date-->
{%if nowMonth%}
<h1 id="calender-date" style="color:black;">{{table.date}}</h1>
{%else%}
<h1 id="calender-date">{{table.date}}</h1>
{%endif%}

<button onclick="bold()" class="button"><i class="bi bi-type-bold"></i></button>
<button onclick="underline()" class="button"><i class="bi bi-type-underline"></i></button>
<button onclick="italic()" class="button"><i class="bi bi-type-italic"></i></button>
<button onclick="changeFontColor()" class="button">Font Color</button>
<button onclick="changeBackColor()" class="button">Back Color</button>

<!--Color Picker-->
<input type="color" id="colorpicker" style="top:5px; position:relative;">

<!--Left Arrow-->
<form action="/leftArrow" method="POST" id="form-left-arrow">
<input name="table_date1" id="table_date1" value="{{table.date}}" style="display:none;"></input>
<button class="button"><i class="bi bi-arrow-left"></i> Next</button>
</form>

<!--Right Arrow-->
<form action="/rightArrow" method="POST" id="form-right-arrow">
<input name="table_date2" id="table_date2" value="{{table.date}}" style="display:none;"></input>
<button class="button" >Previous <i class="bi bi-arrow-right"></i></button>
</form>

</div>

<div style="height:10px;"></div>


<div id="div-table-and-buttons">

<div id="div-buttons-regenerate">

<!--Regenerate No Filter-->
<form action="/regenerateTableNoFilter" method="POST">
<input name="table_id" id="table_id" value="{{table.id}}" style="display:none;"></input>
<button class="button" style="width:170px;">Regenerate Month Without Filters</button>
</form>

<div style="height:10px;"></div>

<!--Regenerate With Filter-->
<form action="/regenerateTable" method="POST">
<input name="table_id" id="table_id" value="{{table.id}}" style="display:none;"></input>
<button class="button">Regenerate Month</button>
</form>

<div style="height:10px;"></div>


<!--Delete Month-->
<form action="/deleteTable" method="POST">
<input name="table_id" id="table_id" value="{{table.id}}" style="display:none;"></input>
<button class="button">Delete Month</button>
</form>

</div>

<!--Calender Table-->
{{table.table | safe}}

</div>

<div style="height:20px;"></div>



<div id="div-schoolClass">
<h1>Class</h1>
<h3>{{current_user.schoolClass}}</h3>
</div>

<div id="div-keywords-majors">

<div id="div-majors">

<div style="height:10px;"></div>
<form action="/addMajor" method="POST">

<h1>Add Majors</h1>

<!--Add Majors-->
<div dir="rtl">
{{getMajors("<select id='selectMajor' name='selectMajor' class='form-select'>",True) | safe}}
</div>


<!--Distinguish if user has majors and change css class accordinly-->
{%if not user.majors or user.majors==''%}
<button onclick="addMajor()" id="majorButton" class="button noMajorButton">Add</button>
{%else%}
<button onclick="addMajor()" id="majorButton" class="button yesMajorButton">Add</button>
{%endif%}
</form>

<div style="height:10px;"></div>


<ul>
<!--Existing Majors-->
{%if user.majors%}
{%for major in getList(user.majors)%}
<li>
{{Major.query.get(major).name}}
<button type="button" class="btn-close btn-close-white" aria-label="Close" onclick="deleteMajor({{major}})"></button>
</li>
{%endfor%}
{%endif%}

</ul>
