<!DOCTYPE html>
<html>
    <head>
    </head>

<body>

<form method="POST">


    <div style="height:50px;"></div>

    <div data-aos="fade-up" data-aos-delay="100" style="width:1300px;">

    <h3 align="center" id="sign-up-title">Sign Up</h3>


    <div class="form-group">
        <label for="email">Email Adress</label>
        <input 
        type="email"
         class="form-control" 
         id="email" name="email" 
         placeholder="Enter email"/>
    </div>
    </br>
    <div class="form-group">
        <label for="schoolClass">Class</label>
        <input 
        type="text"
         class="form-control" 
         id="schoolClass" name="schoolClass" 
         placeholder="Enter class"/>
    </div>
    </br>

    
    <div class="form-group">
        <label for="password1">Enter Password</label>
        <input 
        type="password"
         class="form-control" 
         id="password1" name="password1" 
         placeholder="Enter password"/>
    </div>
    </br>

     <div class="form-group">
        <label for="password2">Confirm Password</label>
        <input 
        type="password"
         class="form-control" 
         id="password2" name="password2" 
         placeholder="Password (confirm)"/>
    </div>

    <br/>
    <button type="submit" class="btn btn-primary" id="sign-up" name="sign-up" value="sign-up">Submit</button>
    </div>

</form>

<div style="height:50px;"></div>

</body>
</html>
